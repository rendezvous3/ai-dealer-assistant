name = "dealer-chat-backend"
main = "src/index.ts"
compatibility_date = "2025-11-24"

# PORT: 9743 — dealer POC backend (see CLAUDE.md § Port Registry for convention)
[dev]
port = 9743

[vars]
PROFILE_TYPE = "MERCHANT"
ENVIRONMENT = "qa"
SHOP_BASE_URL = "http://localhost:5173"
STORE_STATE = "co"
ALLOWED_STORE_IDS = "mountain-motors"
DEFAULT_STORE_ID = "mountain-motors"
UNKNOWN_STORE_ID = "unknown"

# Vehicle catalog — D1 database
[[d1_databases]]
binding = "VEHICLES_DB"
database_name = "vehicle-catalog"
database_id = "c1d9a63c-d943-46d8-857a-907e0c95a66f"

# Chat/session/search/compliance analytics writes.
[[d1_databases]]
binding = "ANALYTICS_DB"
database_name = "dealer-chat-analytics"
database_id = "64d58a3a-ed1c-4ec2-b871-eee1adbb69dd"
