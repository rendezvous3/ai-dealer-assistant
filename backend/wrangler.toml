name = "wine-chat-backend"
main = "src/index.ts"
compatibility_date = "2025-11-24"

[dev]
port = 9174

[vars]
PROFILE_TYPE = "MERCHANT"

# Product/catalog data. Current code still expects this binding for wine lookup.
[[d1_databases]]
binding = "WINE_DB"
database_name = "wine-catalog"
database_id = "c1d9a63c-d943-46d8-857a-907e0c95a66f"

# Chat/session/search/compliance analytics writes.
[[d1_databases]]
binding = "ANALYTICS_DB"
database_name = "wine-chat-analytics"
database_id = "64d58a3a-ed1c-4ec2-b871-eee1adbb69dd"
